name: Shell Lint

on:
  push:
    paths:
      - "*.sh"
      - "*.desktop"
      - "README.md"
      - "docs/**"
      - ".github/**"
  pull_request:
    paths:
      - "*.sh"
      - "*.desktop"
      - "README.md"
      - "docs/**"
      - ".github/**"

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install shellcheck
        run: |
          curl -sS -L https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.linux.x86_64.tar.xz -o /tmp/shellcheck.tar.xz
          tar -xJf /tmp/shellcheck.tar.xz -C /tmp
          sudo install /tmp/shellcheck-v0.11.0/shellcheck /usr/local/bin/shellcheck
          shellcheck --version

      - name: Lint shell scripts
        run: |
          while IFS= read -r file; do
            shellcheck -x "${file}"
            bash -n "${file}"
          done < <(find . -maxdepth 1 -type f -name "*.sh" | sort)
